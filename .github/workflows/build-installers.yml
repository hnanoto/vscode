name: HCode (installers)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: 1
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

jobs:
  linux:
    name: Linux Installers
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install build tools
        run: |
          sudo apt update -y
          sudo apt install -y build-essential pkg-config libx11-dev libx11-xcb-dev libxkbfile-dev libnotify-bin libkrb5-dev fakeroot rpm python3 python-is-python3

      - name: Install dependencies
        run: |
          set -e

          for i in {1..5}; do
            npm ci && break
            if [ "$i" -eq 5 ]; then
              echo "npm ci failed too many times" >&2
              exit 1
            fi
            echo "npm ci failed attempt $i, retrying..."
          done
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          VSCODE_ARCH: ${{ env.VSCODE_ARCH }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Prepare built-in extensions cache key
        run: |
          mkdir -p .build
          node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Compile (core-ci)
        run: npm run gulp core-ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Linux installers
        run: |
          set -euo pipefail
          source ./build/azure-pipelines/linux/setup-env.sh
          mkdir -p .build/artifacts/linux

          npm run gulp "vscode-linux-${VSCODE_ARCH}-min-ci"
          tar -czf ".build/artifacts/linux/HCode-linux-${VSCODE_ARCH}.tar.gz" -C .. "VSCode-linux-${VSCODE_ARCH}"

          if npm run gulp "vscode-linux-${VSCODE_ARCH}-prepare-deb" && npm run gulp "vscode-linux-${VSCODE_ARCH}-build-deb"; then
            if ls .build/linux/deb/*/deb/*.deb >/dev/null 2>&1; then
              for deb_file in .build/linux/deb/*/deb/*.deb; do
                deb_name="$(basename "$deb_file")"
                cp "$deb_file" ".build/artifacts/linux/HCode-${deb_name}"
              done
            else
              echo "::warning::No .deb files were generated."
            fi
          else
            echo "::warning::Deb package build failed; continuing with tar.gz installer."
          fi

          if npm run gulp "vscode-linux-${VSCODE_ARCH}-prepare-rpm" && npm run gulp "vscode-linux-${VSCODE_ARCH}-build-rpm"; then
            if ls .build/linux/rpm/*/*.rpm >/dev/null 2>&1; then
              for rpm_file in .build/linux/rpm/*/*.rpm; do
                rpm_name="$(basename "$rpm_file")"
                cp "$rpm_file" ".build/artifacts/linux/HCode-${rpm_name}"
              done
            else
              echo "::warning::No .rpm files were generated."
            fi
          else
            echo "::warning::RPM package build failed; continuing with available installers."
          fi

          ls -lah .build/artifacts/linux
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          VSCODE_ARCH: ${{ env.VSCODE_ARCH }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload Linux installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('vscode-installers-linux-{0}-{1}', env.VSCODE_ARCH, github.run_attempt) }}
          path: .build/artifacts/linux
          if-no-files-found: error

  macOS:
    name: macOS Installers (${{ matrix.vscode_arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            npm_arch: arm64
            vscode_arch: arm64
          - runner: macos-15-intel
            npm_arch: x64
            vscode_arch: x64
    env:
      NPM_ARCH: ${{ matrix.npm_arch }}
      VSCODE_ARCH: ${{ matrix.vscode_arch }}
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --break-system-packages setuptools

          for i in {1..5}; do
            npm ci && break
            if [ "$i" -eq 5 ]; then
              echo "npm ci failed too many times" >&2
              exit 1
            fi
            echo "npm ci failed attempt $i, retrying..."
          done
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          VSCODE_ARCH: ${{ env.VSCODE_ARCH }}
          GITHUB_TOKEN: ${{ github.token }}
          GYP_DEFINES: "kerberos_use_rtld=false"

      - name: Prepare built-in extensions cache key
        run: |
          mkdir -p .build
          node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Compile (core-ci)
        run: npm run gulp core-ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build macOS app
        run: |
          set -euo pipefail

          npm run gulp "vscode-darwin-${VSCODE_ARCH}-min-ci"

          APP_NAME="$(node -p "require('./product.json').nameLong + '.app'")"
          APP_PATH="$PWD/../VSCode-darwin-${VSCODE_ARCH}/${APP_NAME}"
          if [ ! -d "$APP_PATH" ]; then
            echo "macOS app not found: $APP_PATH" >&2
            exit 1
          fi
          ls -lah "$APP_PATH"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Setup macOS signing keychain
        id: macos_signing
        run: |
          set -euo pipefail

          if [ -z "${HCODE_MACOS_CERT_P12_BASE64:-}" ] || [ -z "${HCODE_MACOS_CERT_PASSWORD:-}" ] || [ -z "${HCODE_MACOS_SIGN_IDENTITY:-}" ]; then
            echo "macOS signing secrets not configured. Building unsigned macOS artifacts."
            echo "signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "notarization_enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NOTARIZATION_ENABLED=false
          if [ -n "${HCODE_MACOS_NOTARY_APPLE_ID:-}" ] && [ -n "${HCODE_MACOS_NOTARY_APP_PASSWORD:-}" ] && [ -n "${HCODE_MACOS_NOTARY_TEAM_ID:-}" ]; then
            NOTARIZATION_ENABLED=true
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/buildagent.keychain"
          CERT_PATH="$RUNNER_TEMP/hcode-macos-cert.p12"

          echo "$HCODE_MACOS_CERT_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p pwd "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p pwd "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$HCODE_MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k pwd "$KEYCHAIN_PATH"

          echo "codesign_identity=$HCODE_MACOS_SIGN_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "signing_enabled=true" >> "$GITHUB_OUTPUT"
          echo "notarization_enabled=$NOTARIZATION_ENABLED" >> "$GITHUB_OUTPUT"
        env:
          HCODE_MACOS_CERT_P12_BASE64: ${{ secrets.HCODE_MACOS_CERT_P12_BASE64 }}
          HCODE_MACOS_CERT_PASSWORD: ${{ secrets.HCODE_MACOS_CERT_PASSWORD }}
          HCODE_MACOS_SIGN_IDENTITY: ${{ secrets.HCODE_MACOS_SIGN_IDENTITY }}
          HCODE_MACOS_NOTARY_APPLE_ID: ${{ secrets.HCODE_MACOS_NOTARY_APPLE_ID }}
          HCODE_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.HCODE_MACOS_NOTARY_APP_PASSWORD }}
          HCODE_MACOS_NOTARY_TEAM_ID: ${{ secrets.HCODE_MACOS_NOTARY_TEAM_ID }}

      - name: Sign macOS app
        if: steps.macos_signing.outputs.signing_enabled == 'true'
        run: |
          set -euo pipefail
          node build/darwin/sign.ts "$(dirname "$PWD")"

          APP_NAME="$(node -p "require('./product.json').nameLong + '.app'")"
          APP_PATH="$PWD/../VSCode-darwin-${VSCODE_ARCH}/${APP_NAME}"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
        env:
          AGENT_TEMPDIRECTORY: ${{ runner.temp }}
          CODESIGN_IDENTITY: ${{ steps.macos_signing.outputs.codesign_identity }}

      - name: Notarize and staple macOS app
        if: steps.macos_signing.outputs.signing_enabled == 'true' && steps.macos_signing.outputs.notarization_enabled == 'true'
        run: |
          set -euo pipefail
          APP_NAME="$(node -p "require('./product.json').nameLong + '.app'")"
          APP_PATH="$PWD/../VSCode-darwin-${VSCODE_ARCH}/${APP_NAME}"
          NOTARY_ZIP="$RUNNER_TEMP/hcode-notary-${VSCODE_ARCH}.zip"

          rm -f "$NOTARY_ZIP"
          ditto -c -k --keepParent "$APP_PATH" "$NOTARY_ZIP"

          xcrun notarytool submit "$NOTARY_ZIP" \
            --apple-id "$HCODE_MACOS_NOTARY_APPLE_ID" \
            --password "$HCODE_MACOS_NOTARY_APP_PASSWORD" \
            --team-id "$HCODE_MACOS_NOTARY_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
        env:
          HCODE_MACOS_NOTARY_APPLE_ID: ${{ secrets.HCODE_MACOS_NOTARY_APPLE_ID }}
          HCODE_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.HCODE_MACOS_NOTARY_APP_PASSWORD }}
          HCODE_MACOS_NOTARY_TEAM_ID: ${{ secrets.HCODE_MACOS_NOTARY_TEAM_ID }}

      - name: Package macOS installers
        run: |
          set -euo pipefail
          mkdir -p .build/artifacts/macos

          ARCHIVE_PATH="$PWD/.build/artifacts/macos/HCode-darwin-${VSCODE_ARCH}.zip"
          (cd "../VSCode-darwin-${VSCODE_ARCH}" && zip -Xry "$ARCHIVE_PATH" *)

          VSCODE_QUALITY=stable node build/darwin/create-dmg.ts "$(dirname "$PWD")" "$PWD/.build/artifacts/macos"
          if [ -f "$PWD/.build/artifacts/macos/VSCode-darwin-${VSCODE_ARCH}.dmg" ]; then
            mv "$PWD/.build/artifacts/macos/VSCode-darwin-${VSCODE_ARCH}.dmg" "$PWD/.build/artifacts/macos/HCode-darwin-${VSCODE_ARCH}.dmg"
          fi

          ls -lah .build/artifacts/macos
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Notarize and staple macOS DMG
        if: steps.macos_signing.outputs.signing_enabled == 'true' && steps.macos_signing.outputs.notarization_enabled == 'true'
        run: |
          set -euo pipefail
          DMG_PATH="$PWD/.build/artifacts/macos/HCode-darwin-${VSCODE_ARCH}.dmg"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$HCODE_MACOS_NOTARY_APPLE_ID" \
            --password "$HCODE_MACOS_NOTARY_APP_PASSWORD" \
            --team-id "$HCODE_MACOS_NOTARY_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
        env:
          HCODE_MACOS_NOTARY_APPLE_ID: ${{ secrets.HCODE_MACOS_NOTARY_APPLE_ID }}
          HCODE_MACOS_NOTARY_APP_PASSWORD: ${{ secrets.HCODE_MACOS_NOTARY_APP_PASSWORD }}
          HCODE_MACOS_NOTARY_TEAM_ID: ${{ secrets.HCODE_MACOS_NOTARY_TEAM_ID }}

      - name: Upload macOS installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('vscode-installers-macos-{0}-{1}', env.VSCODE_ARCH, github.run_attempt) }}
          path: .build/artifacts/macos
          if-no-files-found: error

  windows:
    name: Windows Installers
    runs-on: windows-2022
    timeout-minutes: 180
    env:
      NPM_ARCH: x64
      VSCODE_ARCH: x64
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        shell: pwsh
        run: |
          . build/azure-pipelines/win32/exec.ps1
          $ErrorActionPreference = "Stop"

          for ($i = 1; $i -le 5; $i++) {
            try {
              exec { npm ci }
              break
            }
            catch {
              if ($i -eq 5) {
                Write-Error "npm ci failed after 5 attempts"
                throw
              }
              Write-Host "npm ci failed attempt $i, retrying..."
              Start-Sleep -Seconds 2
            }
          }
        env:
          npm_config_arch: ${{ env.NPM_ARCH }}
          npm_config_foreground_scripts: "true"
          VSCODE_ARCH: ${{ env.VSCODE_ARCH }}
          GITHUB_TOKEN: ${{ github.token }}

      - name: Prepare built-in extensions cache key
        shell: pwsh
        run: |
          mkdir .build -ea 0
          node build/azure-pipelines/common/computeBuiltInDepsCacheKey.ts > .build/builtindepshash

      - name: Restore built-in extensions cache
        id: cache-builtin-extensions
        uses: actions/cache@v5
        with:
          enableCrossOsArchive: true
          path: .build/builtInExtensions
          key: "builtin-extensions-${{ hashFiles('.build/builtindepshash') }}"

      - name: Download built-in extensions
        if: steps.cache-builtin-extensions.outputs.cache-hit != 'true'
        shell: pwsh
        run: node build/lib/builtInExtensions.ts
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Compile (core-ci)
        shell: pwsh
        run: |
          . build/azure-pipelines/win32/exec.ps1
          $ErrorActionPreference = "Stop"
          exec { npm run gulp core-ci }
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build Windows installers
        shell: pwsh
        run: |
          . build/azure-pipelines/win32/exec.ps1
          $ErrorActionPreference = "Stop"
          mkdir .build\artifacts\windows -ea 0

          exec { npm run gulp "vscode-win32-$env:VSCODE_ARCH-min-ci" }
          exec { npm run gulp "vscode-win32-$env:VSCODE_ARCH-inno-updater" }
          exec { npm run gulp "vscode-win32-$env:VSCODE_ARCH-system-setup" }
          exec { npm run gulp "vscode-win32-$env:VSCODE_ARCH-user-setup" }

          exec { 7z.exe a -tzip ".build\artifacts\windows\HCode-win32-$env:VSCODE_ARCH.zip" "..\VSCode-win32-$env:VSCODE_ARCH\*" "-xr!CodeSignSummary*.md" }
          Copy-Item ".build\win32-$env:VSCODE_ARCH\system-setup\VSCodeSetup.exe" ".build\artifacts\windows\HCodeSetup-$env:VSCODE_ARCH.exe" -Force
          Copy-Item ".build\win32-$env:VSCODE_ARCH\user-setup\VSCodeSetup.exe" ".build\artifacts\windows\HCodeUserSetup-$env:VSCODE_ARCH.exe" -Force

          Get-ChildItem .build\artifacts\windows | Format-Table Name, Length
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Sign Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:HCODE_WINDOWS_CERT_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:HCODE_WINDOWS_CERT_PASSWORD)) {
            Write-Host "Windows signing secrets not configured. Keeping unsigned installers."
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "hcode-windows-cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:HCODE_WINDOWS_CERT_PFX_BASE64))

          $securePassword = ConvertTo-SecureString -String $env:HCODE_WINDOWS_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword -Exportable
          if (-not $cert) {
            throw "Failed to import PFX certificate."
          }

          $signtool = Get-ChildItem "C:\\Program Files (x86)\\Windows Kits\\10\\bin\\*\\x64\\signtool.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe not found on runner."
          }

          $targets = Get-ChildItem ".build\\artifacts\\windows" -Filter "*.exe" -File
          if (@($targets).Count -eq 0) {
            throw "No Windows installer executables found to sign."
          }

          foreach ($file in $targets) {
            & $signtool.FullName sign /fd SHA256 /sha1 $cert.Thumbprint /tr "http://timestamp.digicert.com" /td SHA256 /d "HCode" /du "https://github.com/hnanoto/vscode" $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to sign $($file.FullName)"
            }
            & $signtool.FullName verify /pa $file.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Failed signature verification for $($file.FullName)"
            }
          }

          Get-ChildItem .build\artifacts\windows | Format-Table Name, Length
        env:
          HCODE_WINDOWS_CERT_PFX_BASE64: ${{ secrets.HCODE_WINDOWS_CERT_PFX_BASE64 }}
          HCODE_WINDOWS_CERT_PASSWORD: ${{ secrets.HCODE_WINDOWS_CERT_PASSWORD }}

      - name: Upload Windows installers
        uses: actions/upload-artifact@v7
        with:
          name: ${{ format('vscode-installers-windows-{0}-{1}', env.VSCODE_ARCH, github.run_attempt) }}
          path: .build/artifacts/windows
          if-no-files-found: error

  publish:
    name: Publish Release + Update Feed
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    needs:
      - linux
      - macOS
      - windows
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout microsoft/vscode
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Download all installers
        uses: actions/download-artifact@v6
        with:
          pattern: vscode-installers-*
          path: .build/release-artifacts
          merge-multiple: true

      - name: Show downloaded installer files
        run: |
          set -euo pipefail
          find .build/release-artifacts -maxdepth 2 -type f | sort

      - name: Build release metadata
        id: release_meta
        run: |
          set -euo pipefail
          TAG="hcode-${GITHUB_SHA::12}"
          VERSION="$(node -p "require('./package.json').version")"
          QUALITY="$(node -p "require('./product.json').quality || 'stable'")"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "quality=${QUALITY}" >> "${GITHUB_OUTPUT}"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mapfile -t FILES < <(find .build/release-artifacts -type f | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release files were found." >&2
            exit 1
          fi

          TAG="${{ steps.release_meta.outputs.tag }}"
          TITLE="HCode ${TAG}"
          NOTES="Automated HCode installers for commit ${GITHUB_SHA}."

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILES[@]}" --clobber
            gh release edit "${TAG}" --title "${TITLE}" --notes "${NOTES}" --latest
          else
            gh release create "${TAG}" "${FILES[@]}" --title "${TITLE}" --notes "${NOTES}"
            gh release edit "${TAG}" --latest
          fi

      - name: Prepare gh-pages checkout
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf .build/gh-pages .build/update-feed
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "${REPO_URL}" gh-pages >/dev/null 2>&1; then
            git clone --depth=1 --branch gh-pages "${REPO_URL}" .build/gh-pages
          else
            mkdir -p .build/gh-pages
            git init .build/gh-pages
            git -C .build/gh-pages checkout -b gh-pages
            git -C .build/gh-pages remote add origin "${REPO_URL}"
          fi

      - name: Generate update feed files
        run: |
          set -euo pipefail
          node .github/scripts/generate-update-feed.mjs \
            --artifacts-dir .build/release-artifacts \
            --existing-feed-dir .build/gh-pages \
            --output-dir .build/update-feed \
            --repo "${GITHUB_REPOSITORY}" \
            --tag "${{ steps.release_meta.outputs.tag }}" \
            --commit "${GITHUB_SHA}" \
            --version "${{ steps.release_meta.outputs.version }}" \
            --quality "${{ steps.release_meta.outputs.quality }}" \
            --max-history 300

      - name: Publish update feed to gh-pages
        run: |
          set -euo pipefail
          rsync -a --delete --exclude '.git' .build/update-feed/ .build/gh-pages/
          touch .build/gh-pages/.nojekyll

          git -C .build/gh-pages config user.name "github-actions[bot]"
          git -C .build/gh-pages config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C .build/gh-pages add -A

          if git -C .build/gh-pages diff --cached --quiet; then
            echo "No update feed changes to publish."
            exit 0
          fi

          git -C .build/gh-pages commit -m "chore: update feed for ${GITHUB_SHA::7}"
          git -C .build/gh-pages push origin gh-pages
